<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="popup.css">
  <title>AniWorld Sicherung</title>
</head>
<body>
  <main>
    <h1>AniWorld Sicherung</h1>
    <p id="status">Noch keine Listen gesichert.</p>
    <dl>
      <div><dt>Watchlist</dt><dd id="watchlist-count">0</dd></div>
      <div><dt>Abonniert</dt><dd id="subscriptions-count">0</dd></div>
    </dl>
    <button id="export" type="button">JSON jetzt herunterladen</button>
    <p class="hint">Öffne deine Watchlist und danach „Abonniert“. Die Erweiterung aktualisiert die Datei automatisch. Bei einem Fehler steht die Firefox-Meldung oben.</p>
  </main>
  <script src="popup.js"></script>
</body>
</html>
